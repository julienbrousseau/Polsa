<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polsa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 440px;
      height: 300px;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-app-region: drag;
    }

    .card {
      width: 440px;
      height: 300px;
      background: radial-gradient(ellipse at 40% 40%, #0d1a2e 0%, #07101c 55%, #030912 100%);
      border: 1.5px solid rgba(0, 212, 255, 0.28);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 40px rgba(0, 212, 255, 0.10),
        0 0 100px rgba(0, 212, 255, 0.04),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* Corner circuit accents */
    .card::before {
      content: '';
      position: absolute;
      top: 12px; left: 12px;
      width: 32px; height: 32px;
      border-top: 1.5px solid rgba(0, 212, 255, 0.45);
      border-left: 1.5px solid rgba(0, 212, 255, 0.45);
      border-radius: 3px 0 0 0;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: 12px; right: 12px;
      width: 32px; height: 32px;
      border-bottom: 1.5px solid rgba(0, 212, 255, 0.45);
      border-right: 1.5px solid rgba(0, 212, 255, 0.45);
      border-radius: 0 0 3px 0;
    }

    /* Scan-line shimmer overlay */
    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.04) 3px,
        rgba(0, 0, 0, 0.04) 4px
      );
      pointer-events: none;
      border-radius: 20px;
    }

    /* Moving scan line */
    .scan {
      position: absolute;
      left: 0; right: 0;
      height: 60px;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(0, 212, 255, 0.04) 50%,
        transparent 100%
      );
      animation: scan-move 3s linear infinite;
      pointer-events: none;
    }

    @keyframes scan-move {
      0%   { top: -60px; }
      100% { top: 360px; }
    }

    /* Icon wrapper */
    .icon-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .icon-wrap svg {
      width: 120px;
      height: 120px;
      filter: drop-shadow(0 0 16px rgba(0, 212, 255, 0.5))
              drop-shadow(0 0 40px rgba(0, 212, 255, 0.2));
      animation: icon-pulse 3s ease-in-out infinite;
    }

    @keyframes icon-pulse {
      0%, 100% { filter: drop-shadow(0 0 14px rgba(0,212,255,0.45)) drop-shadow(0 0 36px rgba(0,212,255,0.18)); }
      50%       { filter: drop-shadow(0 0 24px rgba(0,212,255,0.75)) drop-shadow(0 0 60px rgba(0,212,255,0.30)); }
    }

    /* Text */
    .app-name {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: #e8f4ff;
      text-transform: uppercase;
      text-shadow:
        0 0 12px rgba(0, 212, 255, 0.6),
        0 0 30px rgba(0, 212, 255, 0.25);
      line-height: 1;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 10.5px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(0, 212, 255, 0.65);
      margin-bottom: 28px;
    }

    /* Loading dots */
    .dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #00d4ff;
      opacity: 0.2;
      animation: dot-blink 1.4s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(0, 212, 255, 0.6);
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }
    .dot:nth-child(4) { animation-delay: 0.66s; }
    .dot:nth-child(5) { animation-delay: 0.88s; }

    @keyframes dot-blink {
      0%, 80%, 100% { opacity: 0.15; transform: scale(1); }
      40%            { opacity: 1;    transform: scale(1.35); }
    }

    /* Bottom version text */
    .version {
      position: absolute;
      bottom: 16px;
      right: 20px;
      font-size: 9.5px;
      letter-spacing: 0.15em;
      color: rgba(0, 212, 255, 0.3);
    }
  </style>
