name: Deploy Companion PWA

on:
  push:
    branches: [main]
    paths:
      - 'companion/**'
      - '.github/workflows/deploy-companion.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: companion/package-lock.json

      - name: Install dependencies
        working-directory: companion
        run: npm ci

      - name: Build companion PWA
        working-directory: companion
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: companion/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
        with:
          artifact_name: github-pages
          timeout: 600000
          error_count: 10
          reporting_interval: 5000
